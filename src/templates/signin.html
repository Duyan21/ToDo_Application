{% extends "index.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="text-center">
    <div class="mb-4">
      <button id="show-register" class="btn btn-secondary me-2">Đăng ký</button>
      <button id="show-login" class="btn btn-primary">Đăng nhập</button>
    </div>
    <div id="login-form" class="form-container">
      <h2 class="mb-4">Đăng nhập</h2>
      <form>
        <div class="mb-3">
          <input type="email" id="login-email" class="form-control" placeholder="Email">
        </div>
        <div class="mb-3">
          <input type="password" id="login-password" class="form-control" placeholder="Mật khẩu">
        </div>
        <button type="submit" class="btn btn-success w-100">Đăng nhập</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
