{% extends "index.html" %}

{% block title %}Tickly{% endblock %}

{% block content %}
<style>
  body {
    background: linear-gradient(145deg, #dbeeff 0%, #c2e0f5 50%, #b5dced 100%);
    min-height: 100vh;
    margin: 0;
  }
  .container-fluid {
    padding: 0 !important;
    margin: 0 !important;
  }
  .auth-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .brand-logo {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #4db8ff, #1a8fe3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 4px 14px rgba(26,143,227,0.35);
  }
  .brand-title {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
    text-align: center;
  }
  .brand-subtitle {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 28px;
    text-align: center;
  }
  .auth-card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  .tab-switcher {
    display: flex;
    background: #f3f4f6;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: #fff;
    color: #1a1a2e;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
    display: block;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
    width: 17px;
    height: 17px;
    pointer-events: none;
  }
  .form-input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-size: 14px;
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    color: #1a1a2e;
    box-sizing: border-box;
  }
  .form-input:focus {
    border-color: #3b9ded;
    background: #fff;
  }
  .password-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .forgot-link {
    font-size: 13px;
    color: #3b9ded;
    text-decoration: none;
    font-weight: 500;
  }
  .forgot-link:hover { text-decoration: underline; }
  .field-hint {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 4px;
  }
  .btn-auth {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #3b9ded, #1a73e8);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-auth:hover { opacity: 0.9; }
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #6b7280;
  }
  .auth-footer a {
    color: #3b9ded;
    font-weight: 600;
    text-decoration: none;
  }
  .auth-footer a:hover { text-decoration: underline; }
</style>

<div class="auth-wrapper">
  <div class="brand-logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <div class="brand-title">ToDo Application</div>
  <div class="brand-subtitle">Tasks, focused. Days, organized.</div>

  <div class="auth-card">
    <div class="tab-switcher">
      <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create account</button>
    </div>

    <!-- Sign In Form -->
    <form id="login-form">
      <div class="input-wrap">
        <label class="field-label">Email</label>
        <div style="position:relative">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com">
        </div>
      </div>
      <div class="input-wrap">
        <div class="password-row">
          <label class="field-label" style="margin-bottom:0">Password</label>
          <a href="#" class="forgot-link">Forgot?</a>
        </div>
        <div style="position:relative">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn-auth">Login &rarr;</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" style="display:none">
      <div class="input-wrap">
        <label class="field-label">Full name</label>
        <div style="position:relative">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="reg-name" class="form-input" placeholder="Ada Lovelace">
        </div>
      </div>
      <div class="input-wrap">
        <label class="field-label">Email</label>
        <div style="position:relative">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="reg-email" class="form-input" placeholder="you@example.com">
        </div>
      </div>
      <div class="input-wrap">
        <label class="field-label">Password</label>
        <div style="position:relative">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="reg-password" class="form-input" placeholder="••••••••">
        </div>
        <div class="field-hint">At least 8 characters.</div>
      </div>
      <button type="submit" class="btn-auth">Register &rarr;</button>
    </form>

    <div class="auth-footer" id="footer-signin">
      New to Tickly? <a href="#" onclick="switchTab('register');return false;">Create an account</a>
    </div>
    <div class="auth-footer" id="footer-register" style="display:none">
      Already have an account? <a href="#" onclick="switchTab('signin');return false;">Sign in instead</a>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  var isSignin = tab === 'signin';
  document.getElementById('login-form').style.display = isSignin ? '' : 'none';
  document.getElementById('register-form').style.display = isSignin ? 'none' : '';
  document.getElementById('footer-signin').style.display = isSignin ? '' : 'none';
  document.getElementById('footer-register').style.display = isSignin ? 'none' : '';
  document.getElementById('tab-signin').classList.toggle('active', isSignin);
  document.getElementById('tab-register').classList.toggle('active', !isSignin);
}
if (new URLSearchParams(window.location.search).get('tab') === 'register') {
  switchTab('register');
}
</script>
{% endblock %}
